image:
  repository: rayproject/ray
  tag: 2.52.0
  pullPolicy: IfNotPresent

head:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  rayStartParams:
    dashboard-host: "0.0.0.0"

worker:
  groupName: cpu-worker
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  rayStartParams: {}
